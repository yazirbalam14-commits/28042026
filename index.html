<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Nuestro Arrullo Estelar</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Manrope:wght@200;400;500;700;800&family=Be+Vietnam+Pro:wght@100;300;400;500;700&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#ca98ff",
                "primary-dim": "#8A2BE2",
                "secondary": "#00fbfb",
                "tertiary": "#ff51fa",
                "surface": "#0e0e14",
                "on-surface": "#f0ecf6",
              },
              fontFamily: {
                "headline": ["Manrope", "sans-serif"],
                "body": ["Be Vietnam Pro", "sans-serif"],
                "serif-fancy": ["Playfair Display", "serif"],
                "pixel": ["'Press Start 2P'", "cursive"],
              }
            },
          },
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="script.js" defer></script>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/30 min-h-screen overflow-hidden">

<div id="world-container" class="fixed inset-0 z-0 bg-[#0e0e14] overflow-hidden"></div>

<!-- Pantalla de Inicio -->
<div id="start-overlay" class="fixed inset-0 z-[300] flex flex-col items-center justify-center transition-opacity duration-1000 bg-[#050510]">
    <div class="absolute inset-0 z-0 opacity-40">
        <div class="absolute inset-0 pixel-bg" style="background-image: url('imagenes/memoria_00.png'); background-size: cover;"></div>
    </div>
    <div class="relative z-20 flex flex-col items-center gap-8 text-center">
        <!-- Cuenta Regresiva -->
        <div id="countdown-display" class="flex gap-2 md:gap-6 mb-4 bg-black/40 p-4 md:p-8 rounded-[1.5rem] md:rounded-[2rem] border border-white/10 backdrop-blur-sm">
            <div class="flex flex-col"><span id="cd-days" class="text-2xl md:text-5xl font-pixel text-primary">00</span><span class="text-[6px] md:text-[8px] font-pixel opacity-50 mt-2">DÍAS</span></div>
            <div class="text-xl md:text-3xl text-primary/30 pt-1">:</div>
            <div class="flex flex-col"><span id="cd-hours" class="text-2xl md:text-5xl font-pixel text-primary">00</span><span class="text-[6px] md:text-[8px] font-pixel opacity-50 mt-2">HORAS</span></div>
            <div class="text-xl md:text-3xl text-primary/30 pt-1">:</div>
            <div class="flex flex-col"><span id="cd-minutes" class="text-2xl md:text-5xl font-pixel text-primary">00</span><span class="text-[6px] md:text-[8px] font-pixel opacity-50 mt-2">MIN</span></div>
            <div class="text-xl md:text-3xl text-primary/30 pt-1">:</div>
            <div class="flex flex-col"><span id="cd-seconds" class="text-2xl md:text-5xl font-pixel text-primary">00</span><span class="text-[6px] md:text-[8px] font-pixel opacity-50 mt-2">SEG</span></div>
        </div>

        <h1 id="secret-trigger" class="font-pixel text-primary text-xs md:text-sm tracking-[0.4em] animate-pulse uppercase cursor-pointer select-none">
            ANIVERSARIO 2026
        </h1>
        
        <button id="start-btn" onclick="startExperience()" disabled class="px-12 py-4 bg-white/5 border border-white/10 rounded-full text-white/20 font-bold tracking-tight transition-all transform text-lg min-w-[240px] z-50 uppercase">
            ESPERANDO FECHA...
        </button>
    </div>
</div>

<!-- BARRA DE NAVEGACIÓN INFERIOR -->
<div id="bottom-nav-bar" class="fixed bottom-0 left-0 right-0 z-[200] flex flex-col items-center gap-4 p-6">
    <!-- Mensajes Románticos (encima de los botones) -->
    <div id="romantic-message-container" class="w-full flex justify-center pointer-events-none text-center min-h-[60px]"></div>
    
    <!-- Barra de Botones -->
    <nav class="flex items-center gap-6 bg-black/20 backdrop-blur-md px-8 py-3 rounded-full border border-white/10 pointer-events-auto shadow-2xl transition-all hover:bg-black/40">
        <button onclick="showRomanticMessage()" class="group transition-all active:scale-90" title="Razón por amarte">
            <span class="material-symbols-outlined text-tertiary/60 group-hover:text-tertiary text-2xl" style="font-variation-settings: 'FILL' 1;">favorite</span>
        </button>
        <div class="w-px h-6 bg-white/10"></div>
        <button onclick="toggleGamesMenu()" class="group transition-all active:scale-90" title="Juegos">
            <span class="material-symbols-outlined text-secondary/60 group-hover:text-secondary text-2xl">sports_esports</span>
        </button>
        <div class="w-px h-6 bg-white/10"></div>
        <button onclick="toggleBackground()" class="group transition-all active:scale-90" title="Cambiar fondo">
            <span class="material-symbols-outlined text-primary/60 group-hover:text-primary text-2xl">landscape</span>
        </button>
        <div class="w-px h-6 bg-white/10"></div>
        <button onclick="toggleMemoryBook()" class="group transition-all active:scale-90" title="Libro de memorias">
            <span class="material-symbols-outlined text-white/40 group-hover:text-white/80 text-2xl">menu_book</span>
        </button>
        <div class="w-px h-6 bg-white/10"></div>
        <button onclick="toggleMusicMenu()" class="group transition-all active:scale-90" title="Música">
            <span class="material-symbols-outlined text-white/40 group-hover:text-white/80 text-2xl">music_note</span>
        </button>
    </nav>
</div>

<!-- LETRAS CENTRADAS -->
<div id="lyrics-container" class="fixed inset-0 z-40 flex items-center justify-center pointer-events-none px-6">
    <p id="lyric-line" class="font-serif-fancy italic text-4xl md:text-6xl text-white text-center drop-shadow-[0_0_30px_rgba(0,0,0,1)] max-w-5xl"></p>
</div>

<!-- OVERLAY JUEGOS -->
<div id="games-overlay" class="fixed inset-0 z-[400] hidden bg-black/95 backdrop-blur-xl opacity-0 transition-all flex items-center justify-center overflow-y-auto">
    <button onclick="closeGamesMenu()" class="absolute top-8 right-8 text-white/50 hover:text-white transition-all"><span class="material-symbols-outlined text-4xl">close</span></button>
    
    <div id="games-menu-container" class="w-full max-w-md p-10 flex flex-col items-center gap-6 text-center">
        <h2 class="font-pixel text-[10px] text-primary tracking-[0.3em] mb-10 uppercase">Módulos</h2>
        <button onclick="startAnimalSearch()" class="w-full py-5 bg-secondary/10 border border-secondary/30 rounded-2xl text-secondary font-bold hover:bg-secondary/20 transition-all">SOPA DE LETRAS</button>
        <button onclick="startGato()" class="w-full py-5 bg-tertiary/10 border border-tertiary/30 rounded-2xl text-tertiary font-bold hover:bg-tertiary/20 transition-all">GATO CÓSMICO</button>
    </div>

    <!-- GATO INTERFAZ -->
    <div id="gato-container" class="hidden w-full max-w-5xl px-6 py-20">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
            <div class="lg:col-span-4 text-center bg-white/5 p-8 rounded-[2rem] border border-white/10">
                <div class="w-40 h-40 mx-auto rounded-3xl overflow-hidden border-4 border-secondary mb-6 shadow-2xl">
                    <img src="imagenes/memoria_00.png" class="w-full h-full object-cover">
                </div>
                <h3 class="text-secondary font-pixel text-[12px] mb-6 uppercase">Jirafín</h3>
                <div class="flex flex-col gap-3 mb-8">
                    <button onclick="setGatoDifficulty('normal')" id="btn-diff-normal" class="py-2 rounded-full border-2 border-secondary text-secondary text-[8px] font-pixel transition-all uppercase">Normal</button>
                    <button onclick="setGatoDifficulty('hard')" id="btn-diff-hard" class="py-2 rounded-full border border-white/10 text-[8px] font-pixel transition-all uppercase">Mente Maestra</button>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-black/40 p-3 rounded-xl border border-white/5"><p class="text-[8px] opacity-40">TÚ</p><p id="gato-score-player" class="text-3xl font-pixel text-primary">00</p></div>
                    <div class="bg-black/40 p-3 rounded-xl border border-white/5"><p class="text-[8px] opacity-40">CPU</p><p id="gato-score-cpu" class="text-3xl font-pixel text-secondary">00</p></div>
                </div>
            </div>
            <div class="lg:col-span-8 flex flex-col items-center">
                <div class="grid grid-cols-3 gap-5 p-6 bg-white/5 rounded-[3rem] border border-white/20 shadow-2xl">
                    <button id="gato-cell-0" onclick="handleGato(0)" class="w-24 h-24 md:w-32 md:h-32 bg-surface-container-low hover:bg-white/10 rounded-[1.5rem] border border-white/10 transition-all flex items-center justify-center"></button>
                    <button id="gato-cell-1" onclick="handleGato(1)" class="w-24 h-24 md:w-32 md:h-32 bg-surface-container-low hover:bg-white/10 rounded-[1.5rem] border border-white/10 transition-all flex items-center justify-center"></button>
                    <button id="gato-cell-2" onclick="handleGato(2)" class="w-24 h-24 md:w-32 md:h-32 bg-surface-container-low hover:bg-white/10 rounded-[1.5rem] border border-white/10 transition-all flex items-center justify-center"></button>
                    <button id="gato-cell-3" onclick="handleGato(3)" class="w-24 h-24 md:w-32 md:h-32 bg-surface-container-low hover:bg-white/10 rounded-[1.5rem] border border-white/10 transition-all flex items-center justify-center"></button>
                    <button id="gato-cell-4" onclick="handleGato(4)" class="w-24 h-24 md:w-32 md:h-32 bg-surface-container-low hover:bg-white/10 rounded-[1.5rem] border border-white/10 transition-all flex items-center justify-center"></button>
                    <button id="gato-cell-5" onclick="handleGato(5)" class="w-24 h-24 md:w-32 md:h-32 bg-surface-container-low hover:bg-white/10 rounded-[1.5rem] border border-white/10 transition-all flex items-center justify-center"></button>
                    <button id="gato-cell-6" onclick="handleGato(6)" class="w-24 h-24 md:w-32 md:h-32 bg-surface-container-low hover:bg-white/10 rounded-[1.5rem] border border-white/10 transition-all flex items-center justify-center"></button>
                    <button id="gato-cell-7" onclick="handleGato(7)" class="w-24 h-24 md:w-32 md:h-32 bg-surface-container-low hover:bg-white/10 rounded-[1.5rem] border border-white/10 transition-all flex items-center justify-center"></button>
                    <button id="gato-cell-8" onclick="handleGato(8)" class="w-24 h-24 md:w-32 md:h-32 bg-surface-container-low hover:bg-white/10 rounded-[1.5rem] border border-white/10 transition-all flex items-center justify-center"></button>
                </div>
                <button onclick="startGato()" class="mt-12 px-10 py-4 bg-primary text-white rounded-full font-pixel text-[10px] shadow-xl hover:scale-105 active:scale-95 transition-all">REINICIAR TABLERO</button>
            </div>
        </div>
    </div>

    <!-- SOPA INTERFAZ -->
    <div id="animal-search-container" class="hidden w-full max-w-6xl px-4 py-20 flex flex-col items-center">
        <div class="bg-white/5 backdrop-blur-xl px-10 py-4 rounded-full border border-white/10 mb-10 flex items-center gap-6 shadow-2xl">
            <span class="material-symbols-outlined text-secondary text-4xl">schedule</span>
            <span id="animal-timer-text" class="text-4xl font-pixel text-secondary tracking-widest">01:00</span>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10 w-full">
            <aside class="lg:col-span-3 bg-black/40 p-8 rounded-[2rem] border border-white/5 shadow-2xl">
                <h3 class="text-primary font-pixel text-[8px] mb-8 tracking-[0.2em] text-center uppercase">Objetivos Astrales</h3>
                <ul id="word-list" class="space-y-5"></ul>
            </aside>
            <div class="lg:col-span-6 flex justify-center">
                <div id="animal-grid" class="grid grid-cols-12 gap-1.5 p-4 bg-white/5 rounded-[2rem] border border-white/10 shadow-2xl"></div>
            </div>
            <div class="lg:col-span-3 flex flex-col gap-6">
                <button onclick="solveAnimalSearch()" class="py-5 bg-primary/10 border-2 border-primary/30 rounded-2xl text-primary font-bold text-xs uppercase tracking-widest hover:bg-primary/20 transition-all">Pista Divina</button>
                <button onclick="startAnimalSearch()" class="py-5 bg-white/5 border-2 border-white/10 rounded-2xl text-white/40 font-bold text-xs uppercase tracking-widest hover:bg-white/10 transition-all">Reset Nivel</button>
            </div>
        </div>
    </div>
</div>

<!-- LIBRO OVERLAY -->
<div id="memory-book-overlay" class="fixed inset-0 z-[400] hidden bg-black/98 backdrop-blur-3xl opacity-0 transition-all flex flex-col items-center justify-center p-4">
    <button onclick="toggleMemoryBook()" class="absolute top-4 right-4 md:top-8 md:right-8 text-white/50 hover:text-white transition-all z-[450]"><span class="material-symbols-outlined text-3xl md:text-4xl">close</span></button>
    <div id="book-viewport" class="w-full max-w-5xl h-[80vh] md:h-[75vh] relative overflow-y-auto rounded-[2rem] md:rounded-[3rem]"></div>
    <div class="mt-6 md:mt-10 flex gap-8 md:gap-16">
        <button id="prev-page" onclick="prevPage()" class="nav-book-btn">← VOLVER</button>
        <button id="next-page" onclick="nextPage()" class="nav-book-btn">SIGUIENTE →</button>
    </div>
</div>

<!-- MENÚ MÚSICA -->
<aside id="music-menu" class="fixed right-0 top-0 bottom-0 w-80 bg-black/90 backdrop-blur-2xl border-l border-white/5 transform translate-x-full transition-transform duration-500 z-[500] p-8 flex flex-col shadow-2xl">
    <button onclick="toggleMusicMenu()" class="absolute top-8 left-8 text-white/50 hover:text-white transition-all"><span class="material-symbols-outlined text-3xl">close</span></button>
    <h3 class="text-primary font-pixel text-[10px] tracking-widest uppercase mb-8 mt-24 text-center font-bold">Soundtrack</h3>
    
    <div class="flex justify-center items-center gap-6 mb-10 bg-white/5 p-6 rounded-2xl border border-white/10 shadow-xl">
        <button onclick="prevSong()" class="text-secondary hover:scale-110 active:scale-95 transition-all"><span class="material-symbols-outlined text-3xl">skip_previous</span></button>
        <button onclick="togglePlay()" id="play-pause-btn" class="w-14 h-14 bg-secondary/20 rounded-full flex items-center justify-center text-secondary border border-secondary/40 hover:bg-secondary/30 transition-all">
            <span class="material-symbols-outlined text-4xl" id="play-pause-icon">pause</span>
        </button>
        <button onclick="nextSong()" class="text-secondary hover:scale-110 active:scale-95 transition-all"><span class="material-symbols-outlined text-3xl">skip_next</span></button>
    </div>

    <div class="flex flex-col gap-4 overflow-y-auto" id="playlist-items"></div>
</aside>

<audio id="bg-music"></audio>
<div id="flash-overlay" class="fixed inset-0 bg-white opacity-0 pointer-events-none z-[700] transition-opacity duration-1000"></div>

</body>
</html>
