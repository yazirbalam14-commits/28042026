<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                "primary": "#8A2BE2",
                "on-surface": "#e6e3f5",
                "surface-dim": "#0d0d19",
              },
              "borderRadius": {
                "DEFAULT": "0.5rem",
                "lg": "0.5rem",
                "xl": "0.5rem",
                "full": "9999px"
              },
              "fontFamily": {
                "headline": ["Playfair Display", "serif"],
                "body": ["Manrope", "sans-serif"],
                "serif-fancy": ["Playfair Display", "serif"],
                "pixel": ["'Press Start 2P'", "cursive"]
              }
            },
          },
        }
    </script>
<style>
        body {
            background-color: #0d0d19;
            color: #e6e3f5;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        .pixel-scanline {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        .ethereal-glow {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5), 0 0 30px rgba(138, 43, 226, 0.3);
        }
        .icon-glow {
            filter: drop-shadow(0 0 8px rgba(138, 43, 226, 0.6));
        }
    
        @keyframes messageFade {
            0% { opacity: 0; transform: translateY(10px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }
        .romantic-message {
            font-family: 'Press Start 2P', cursive;
            animation: messageFade 4s ease-in-out forwards;
            text-shadow: 2px 2px #000;
        }

        /* Rain of Sparkles Animation */
        @keyframes fall {
            0% { transform: translateY(-10vh) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh) translateX(20px); opacity: 0; }
        }
        .falling-sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 8px 1px rgba(255, 255, 255, 0.6);
            animation: fall linear infinite;
        }

        /* Pulsing Light Burst */
        @keyframes pulseBurst {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.25; transform: scale(1.1); }
        }
        .light-burst {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.25) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            mix-blend-mode: screen;
            filter: blur(60px);
            animation: pulseBurst 8s infinite ease-in-out;
        }

        .scene {
            transition: opacity 1s ease-in-out;
        }
    </style>
</head>
<body class="font-body selection:bg-primary/30 selection:text-white m-0 p-0 overflow-hidden w-screen h-screen">
<!-- Background Layer -->
<div class="fixed inset-0 z-0 overflow-hidden">
<!-- Main Fullscreen Background -->
<div class="scene absolute inset-0 opacity-100" id="scene-main">
<img alt="Romantic pixel art couple" class="w-full h-full object-cover block scale-105" src="https://lh3.googleusercontent.com/aida/ADBb0ui6nmxEYlFrEcZKlQKzOtjx8J0Du1c3zpm6jcio_thjJSK6pB4ur1S6SueQfZVwjjTRgdsL-7QJizVwEYHTVv3V_ZfNef3tT-GVQmmYmwR17vlcrTwInJBS1H8zeNzMgV8xCxoYwQtUbrttj5bkHAPDOWQQ9DMaAO7OG7Bdb3SBXXHyWAZKTpco_Zepjkf8g4vFtNdoaTAmdjfulXEgzEtQdmYJGGoeINWcwntoEx0CjXA2i1RmmF_1gAhBJ4jtEw21m6fz5ClJIQ"/>
<!-- Immersive Animation Overlay -->
<div class="absolute inset-0" id="sparkle-rain-container">
<!-- Soft pulsing ambient lights -->
<div class="light-burst" style="top: -200px; left: -100px; animation-delay: 0s;"></div>
<div class="light-burst" style="bottom: -200px; right: -100px; animation-delay: 4s;"></div>
<div class="light-burst" style="top: 20%; right: 10%; width: 300px; height: 300px; animation-delay: 2s; opacity: 0.15;"></div>
</div>
</div>
<!-- Scanline Overlay -->
<div class="absolute inset-0 pixel-scanline z-10 opacity-10"></div>
</div>
<!-- UI Layer -->
<div class="relative z-20 min-h-screen flex flex-col pointer-events-none">
<!-- Main Content Area: Centered Lyrics -->
<main class="flex-grow flex items-center justify-center pointer-events-auto">
<section class="text-center px-6 max-w-4xl">
<div id="lyrics-content">
<p class="font-serif-fancy italic text-4xl md:text-6xl text-white ethereal-glow leading-relaxed tracking-wide">
                        En el faro de tu amor...
                    </p>
</div>
</section>
<!-- Right-Side Vertical Icon Menu -->
<aside class="absolute right-8 top-1/2 -translate-y-1/2 flex flex-col gap-12 items-center">
<button class="group transition-all duration-300 pointer-events-auto" onclick="showRomanticMessage()">
<span class="material-symbols-outlined text-white/60 group-hover:text-white icon-glow text-3xl">favorite</span>
</button>
<button class="group transition-all duration-300 pointer-events-auto">
<span class="material-symbols-outlined text-white/60 group-hover:text-white icon-glow text-3xl">sports_esports</span>
</button>
<button class="group transition-all duration-300 pointer-events-auto" onclick="triggerIntenseRain()">
<span class="material-symbols-outlined text-white group-hover:text-white icon-glow text-3xl">flare</span>
</button>
<button class="group transition-all duration-300 pointer-events-auto">
<span class="material-symbols-outlined text-white/60 group-hover:text-white icon-glow text-3xl">music_note</span>
</button>
</aside>
</main>
<!-- Footer Area -->
<footer class="h-32 flex flex-col items-center justify-center relative px-8 pointer-events-none">
<!-- Message Container -->
<div class="absolute top-0 w-full flex justify-center h-12 overflow-visible" id="romantic-message-container"></div>
<!-- Subtle Info -->
<div class="mt-auto pb-8 w-full flex justify-between items-center opacity-40 pointer-events-auto">
<div class="text-[10px] uppercase tracking-[0.4em] text-white font-body">
                    Eternal Spark // System_Active
                </div>
<div class="text-[8px] uppercase tracking-widest text-white font-pixel">
                    Atmosphere: Immersive
                </div>
</div>
</footer>
</div>
<script>
        const messages = [
            'Eres mi universo',
            'Tu amor es mi guía',
            'Siempre juntos',
            'Bajo las mismas estrellas',
            'Mi corazón es tuyo',
            'Contigo el tiempo se detiene',
            'Eternamente en tus ojos'
        ];
        const colors = ['#FFDAB9', '#FFB7C5', '#FFD700']; 
        let colorIndex = 0;

        function showRomanticMessage() {
            const container = document.getElementById('romantic-message-container');
            container.innerHTML = '';
            const msg = messages[Math.floor(Math.random() * messages.length)];
            const color = colors[colorIndex];
            colorIndex = (colorIndex + 1) % colors.length;
            const msgElement = document.createElement('p');
            msgElement.className = 'romantic-message text-xs md:text-sm tracking-tighter text-center max-w-sm';
            msgElement.style.color = color;
            msgElement.innerText = msg;
            container.appendChild(msgElement);
        }

        function createFallingSparkle(container, isIntense = false) {
            const sparkle = document.createElement('div');
            sparkle.className = 'falling-sparkle';
            
            const size = (isIntense ? 2 : 1) + Math.random() * 3;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            
            sparkle.style.left = Math.random() * 100 + '%';
            
            const duration = (isIntense ? 2 : 4) + Math.random() * 4;
            sparkle.style.animationDuration = duration + 's';
            sparkle.style.animationDelay = '-' + (Math.random() * 10) + 's';
            
            container.appendChild(sparkle);
            
            // Cleanup after one cycle if needed, but since they repeat we mostly just leave initial ones
            if (isIntense) {
                setTimeout(() => sparkle.remove(), duration * 1000);
            }
        }

        function triggerIntenseRain() {
            const container = document.getElementById('sparkle-rain-container');
            for(let i=0; i<30; i++) {
                createFallingSparkle(container, true);
            }
        }

        // Initialize background sparkle rain
        const rainContainer = document.getElementById('sparkle-rain-container');
        for(let i=0; i<40; i++) {
            createFallingSparkle(rainContainer);
        }
    </script>
</body></html>
