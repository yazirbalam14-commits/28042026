<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                "primary": "#8A2BE2",
                "on-surface": "#e6e3f5",
                "surface-dim": "#0d0d19",
              },
              "borderRadius": {
                "DEFAULT": "0.5rem",
                "lg": "0.5rem",
                "xl": "0.5rem",
                "full": "9999px"
              },
              "fontFamily": {
                "headline": ["Playfair Display", "serif"],
                "body": ["Manrope", "sans-serif"],
                "serif-fancy": ["Playfair Display", "serif"],
                "pixel": ["'Press Start 2P'", "cursive"]
              }
            },
          },
        }
    </script>
<style>
        body {
            background-color: #0d0d19;
            color: #e6e3f5;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        .pixel-scanline {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        .ethereal-glow {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4), 0 0 30px rgba(138, 43, 226, 0.2);
        }
        .icon-glow {
            filter: drop-shadow(0 0 8px rgba(138, 43, 226, 0.6));
        }
    
        @keyframes messageFade {
            0% { opacity: 0; transform: translateY(10px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }
        .romantic-message {
            font-family: 'Press Start 2P', cursive;
            animation: messageFade 4s ease-in-out forwards;
            text-shadow: 2px 2px #000;
        }

        /* Sparkle/Flare Animation */
        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
            50% { opacity: 0.8; transform: scale(1) rotate(180deg); }
        }
        .sparkle {
            position: absolute;
            background: radial-gradient(circle, #fff 0%, transparent 70%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.3);
        }

        /* Lamp Flare Effect */
        @keyframes lampPulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
        }
        .lamp-flare {
            position: absolute;
            top: 180px;
            left: 520px;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(255, 165, 0, 0.4) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            mix-blend-mode: screen;
            animation: lampPulse 4s infinite ease-in-out;
        }

        .scene {
            transition: opacity 1s ease-in-out;
        }
    </style>
</head>
<body class="font-body selection:bg-primary/30 selection:text-white m-0 p-0 overflow-hidden w-screen h-screen">
<!-- Background Layer -->
<div class="fixed inset-0 z-0 overflow-hidden">
<!-- Main Fullscreen Background -->
<div class="scene absolute inset-0 opacity-100" id="scene-main">
<img alt="Cozy pixel art room with a sleeping couple" class="w-full h-full object-cover block" src="https://lh3.googleusercontent.com/aida/ADBb0uhNRrZKFm78GZIfp-M2_QQMugKgp6-JVkvi5-Rs9BmO_saHmeat5bH2hgzAYrZ9YKZvDMPr22He5URcBtqYyBp7h2V6gmfno2vgdNVYuHXpfIuHFvibquqvUJoYg80Kgn2bI-Bs7HEEd9rFwGsjgCWNCOAKfSIfhYMYm7E0SgqL7EBZOWlGd3TcQcQmVg81zo3Nv0zdvfkZoNIKdFBbAvMSkraclovQE3Sk_jsVbOjmaqSgQaXGbCkfuaomdfPb6FpcMP1SsUWX"/>
<!-- Interactive Elements Overlay -->
<div class="absolute inset-0" id="sparkle-container">
<!-- Warm glow near the lamp area -->
<div class="lamp-flare hidden md:block" style="top: 25%; left: 52%;"></div>
</div>
</div>
<!-- Scanline Overlay for texture -->
<div class="absolute inset-0 pixel-scanline z-10 opacity-10"></div>
</div>
<!-- UI Layer -->
<div class="relative z-20 min-h-screen flex flex-col pointer-events-none">
<!-- Main Content Area: Centered Lyrics -->
<main class="flex-grow flex items-center justify-center pointer-events-auto">
<section class="text-center px-6 max-w-4xl">
<div id="lyrics-content">
<p class="font-serif-fancy italic text-4xl md:text-6xl text-white ethereal-glow leading-relaxed tracking-wide">
                        En el faro de tu amor...
                    </p>
</div>
</section>
<!-- Right-Side Vertical Icon Menu -->
<aside class="absolute right-8 top-1/2 -translate-y-1/2 flex flex-col gap-12 items-center">
<button class="group transition-all duration-300 pointer-events-auto" onclick="showRomanticMessage()">
<span class="material-symbols-outlined text-white/60 group-hover:text-white icon-glow text-3xl">favorite</span>
</button>
<button class="group transition-all duration-300 pointer-events-auto">
<span class="material-symbols-outlined text-white/60 group-hover:text-white icon-glow text-3xl">sports_esports</span>
</button>
<button class="group transition-all duration-300 pointer-events-auto" onclick="spawnSparkles()">
<span class="material-symbols-outlined text-white/60 group-hover:text-white icon-glow text-3xl">flare</span>
</button>
<button class="group transition-all duration-300 pointer-events-auto">
<span class="material-symbols-outlined text-white/60 group-hover:text-white icon-glow text-3xl">music_note</span>
</button>
</aside>
</main>
<!-- Footer Area -->
<footer class="h-32 flex flex-col items-center justify-center relative px-8 pointer-events-none">
<!-- Message Container -->
<div class="absolute top-0 w-full flex justify-center h-12 overflow-visible" id="romantic-message-container"></div>
<!-- Subtle Info -->
<div class="mt-auto pb-8 w-full flex justify-between items-center opacity-40 pointer-events-auto">
<div class="text-[10px] uppercase tracking-[0.4em] text-white font-body">
                    Ether Lullaby // Audio_Stream_Active
                </div>
<div class="text-[8px] uppercase tracking-widest text-white font-pixel">
                    Sync Status: Stable
                </div>
</div>
</footer>
</div>
<script>
        const messages = [
            'Eres mi universo',
            'Tu amor es mi guía',
            'Siempre juntos',
            'Bajo las mismas estrellas',
            'Mi corazón es tuyo',
            'Contigo el tiempo se detiene',
            'Eternamente en tus ojos'
        ];
        const colors = ['#FFDAB9', '#FFB7C5', '#FFD700']; 
        let colorIndex = 0;

        function showRomanticMessage() {
            const container = document.getElementById('romantic-message-container');
            container.innerHTML = '';
            const msg = messages[Math.floor(Math.random() * messages.length)];
            const color = colors[colorIndex];
            colorIndex = (colorIndex + 1) % colors.length;
            const msgElement = document.createElement('p');
            msgElement.className = 'romantic-message text-xs md:text-sm tracking-tighter text-center max-w-sm';
            msgElement.style.color = color;
            msgElement.innerText = msg;
            container.appendChild(msgElement);
        }

        function spawnSparkles() {
            const container = document.getElementById('sparkle-container');
            for(let i=0; i<15; i++) {
                createSparkle(container);
            }
        }

        function createSparkle(container) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            sparkle.style.left = x + '%';
            sparkle.style.top = y + '%';
            
            const size = 2 + Math.random() * 4;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            
            const duration = 2 + Math.random() * 3;
            sparkle.style.animation = `sparkle ${duration}s ease-in-out forwards`;
            
            container.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), duration * 1000);
        }

        // Ambient Sparkles
        setInterval(() => {
            const container = document.getElementById('sparkle-container');
            if (Math.random() > 0.4) {
                createSparkle(container);
            }
        }, 800);
    </script>
</body></html>
