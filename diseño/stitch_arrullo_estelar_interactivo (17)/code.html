<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                "primary": "#8A2BE2",
                "on-surface": "#e6e3f5",
                "surface-dim": "#0d0d19",
              },
              "borderRadius": {
                "DEFAULT": "0.5rem",
                "lg": "0.5rem",
                "xl": "0.5rem",
                "full": "9999px"
              },
              "fontFamily": {
                "headline": ["Playfair Display", "serif"],
                "body": ["Manrope", "sans-serif"],
                "serif-fancy": ["Playfair Display", "serif"],
                "pixel": ["'Press Start 2P'", "cursive"]
              }
            },
          },
        }
    </script>
<style>
        body {
            background-color: #0d0d19;
            color: #e6e3f5;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        .pixel-scanline {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        .ethereal-glow {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4), 0 0 30px rgba(138, 43, 226, 0.2);
        }
        .icon-glow {
            filter: drop-shadow(0 0 8px rgba(138, 43, 226, 0.6));
        }
    
        @keyframes messageFade {
            0% { opacity: 0; transform: translateY(10px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }
        .romantic-message {
            font-family: 'Press Start 2P', cursive;
            animation: messageFade 4s ease-in-out forwards;
            text-shadow: 2px 2px #000;
        }

        /* Sparkle & Star Animations */
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        @keyframes float {
            0% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(-20px) translateX(10px); }
            100% { transform: translateY(0px) translateX(0px); }
        }
        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(1px);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        /* Pixel Art Effect for Image */
        .pixelated-bg {
            image-rendering: pixelated;
        }

        @keyframes shootingStar {
            0% { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 0; }
            10% { opacity: 1; }
            30% { transform: translateX(-400px) translateY(400px) rotate(-45deg); opacity: 0; }
            100% { transform: translateX(-400px) translateY(400px) rotate(-45deg); opacity: 0; }
        }
        .shooting-star {
            position: absolute;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
            opacity: 0;
        }
    </style>
</head>
<body class="font-body selection:bg-primary/30 selection:text-white m-0 p-0 overflow-hidden w-screen h-screen">
<!-- Background Layer -->
<div class="fixed inset-0 z-0 overflow-hidden" id="bg-container">
<!-- Main Fullscreen Background (Cosmic Couple) -->
<div class="scene absolute inset-0 opacity-100" id="scene-main">
<img alt="Pixel art couple watching a giant moon and cosmic sky" class="w-full h-full object-cover block pixelated-bg" src="https://lh3.googleusercontent.com/aida/ADBb0uhQrkwMDUOJswv2t-i3RdPK8-xBdbPllX4MWu_msI-Opp23eriAXZCw5eugvaCYvZ3smi1Eabf861Tku0H6NzV64TasWzXSa4HKE3Ne0beTkYBOX7nEQaoAjrOKJS__lKYztAnKPrWZzuRoJlgwCoF0QR0Vek0SZTV7TjGmSly62X7vNzyI8W3i38xljlkYkZ2xabt2G-4wOMk7GeNd0jlFZt5wS6ltfj1ufny0Md5-l8h_XeKMxa48rnKhSn96qdlhVxBuCf1lPQ"/>
</div>
<!-- Alternative Scene -->
<div class="scene absolute inset-0 opacity-0" id="scene-couple">
<img alt="Pixelated couple sleeping" class="w-full h-full object-cover block pixelated-bg" src="https://lh3.googleusercontent.com/aida/ADBb0ugE1aLD7ZTYaA07P3Bq7WOypBCL7eFSl_3Ef0PRbw1lI2O-bKOFJ3NqnLyf3jNdbWYgaQz5eU6OUkMsS7SZG0iSGiWupMm40fvsjw4hlT6_AGJdJP3n2wCe97q0fsScl7zVZb7GteTBLIIawfmA3p2XYlDQhNt0Ef_PCWqX8ll7ZP0yI7B-e9jZvOMHM9PcruHY8aQq8P5EM7ToXpNAt8Xxn14mWzkg231SQDOM_fnCC7Jiiunxs9hkTqkz4hMzICDvhJfg-wZUBA"/>
</div>
<!-- Sparkle Overlay Layer -->
<div class="absolute inset-0 overflow-hidden z-10" id="sparkle-container"></div>
<!-- Scanline Overlay -->
<div class="absolute inset-0 pixel-scanline z-10 opacity-10"></div>
</div>
<!-- UI Layer -->
<div class="relative z-20 min-h-screen flex flex-col pointer-events-none">
<!-- Main Content Area: Centered Lyrics -->
<main class="flex-grow flex items-center justify-center pointer-events-auto">
<section class="text-center px-6 max-w-4xl">
<div id="lyrics-content">
<p class="font-serif-fancy italic text-4xl md:text-6xl text-white ethereal-glow leading-relaxed tracking-wide" id="main-lyrics">
                        En el faro de tu amor...
                    </p>
</div>
</section>
<!-- Right-Side Vertical Icon Menu -->
<aside class="absolute right-8 top-1/2 -translate-y-1/2 flex flex-col gap-12 items-center">
<button class="group transition-all duration-300 pointer-events-auto" onclick="showRomanticMessage()">
<span class="material-symbols-outlined text-white/60 group-hover:text-white icon-glow text-3xl">favorite</span>
</button>
<button class="group transition-all duration-300 pointer-events-auto">
<span class="material-symbols-outlined text-white/60 group-hover:text-white icon-glow text-3xl">sports_esports</span>
</button>
<button class="group transition-all duration-300 pointer-events-auto" onclick="toggleBackground()">
<span class="material-symbols-outlined text-white/60 group-hover:text-white icon-glow text-3xl" id="landscape-btn-icon">landscape</span>
</button>
<button class="group transition-all duration-300 pointer-events-auto">
<span class="material-symbols-outlined text-white/60 group-hover:text-white icon-glow text-3xl">music_note</span>
</button>
</aside>
</main>
<!-- Footer Area -->
<footer class="h-32 flex flex-col items-center justify-center relative px-8 pointer-events-none">
<!-- Message Container -->
<div class="absolute top-0 w-full flex justify-center h-12 overflow-visible" id="romantic-message-container"></div>
<!-- Subtle Info -->
<div class="mt-auto pb-8 w-full flex justify-between items-center opacity-40 pointer-events-auto">
<div class="text-[10px] uppercase tracking-[0.4em] text-white font-body" id="status-label">
                    Ether Lullaby // Audio_Stream_Active
                </div>
<div class="text-[8px] uppercase tracking-widest text-white font-pixel">
                    Sync Status: Stable
                </div>
</div>
</footer>
</div>
<script>
        const messages = [
            'Eres mi universo',
            'Tu amor es mi guía',
            'Siempre juntos',
            'Bajo las mismas estrellas',
            'Mi corazón es tuyo',
            'Contigo el tiempo se detiene',
            'Eternamente en tus ojos'
        ];
        const colors = ['#FFDAB9', '#FFB7C5', '#FFD700', '#00FFFF', '#FF00FF']; 
        let isCoupleScene = false;

        function createSparkles() {
            const container = document.getElementById('sparkle-container');
            const count = 60; // Increased for a more "magical" feel
            for (let i = 0; i < count; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                const size = Math.random() * 3 + 1;
                sparkle.style.width = `${size}px`;
                sparkle.style.height = `${size}px`;
                sparkle.style.left = `${Math.random() * 100}%`;
                sparkle.style.top = `${Math.random() * 100}%`;
                sparkle.style.animation = `twinkle ${2 + Math.random() * 3}s infinite ease-in-out, float ${8 + Math.random() * 12}s infinite ease-in-out`;
                sparkle.style.animationDelay = `${Math.random() * 5}s`;
                sparkle.style.opacity = Math.random();
                // Randomly assign primary or white color to sparkles
                if (Math.random() > 0.7) {
                    sparkle.style.backgroundColor = '#8A2BE2';
                    sparkle.style.boxShadow = '0 0 10px rgba(138, 43, 226, 0.8)';
                }
                container.appendChild(sparkle);
            }

            // Add periodic shooting stars
            setInterval(() => {
                const star = document.createElement('div');
                star.className = 'shooting-star';
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 50}%`;
                star.style.background = `linear-gradient(90deg, ${colors[Math.floor(Math.random() * colors.length)]} 0%, transparent 100%)`;
                star.style.animation = `shootingStar 1.5s ease-out forwards`;
                container.appendChild(star);
                setTimeout(() => star.remove(), 2000);
            }, 3000); // More frequent
        }

        function showRomanticMessage() {
            const container = document.getElementById('romantic-message-container');
            container.innerHTML = '';
            const msg = messages[Math.floor(Math.random() * messages.length)];
            const color = colors[Math.floor(Math.random() * colors.length)]; 
            const msgElement = document.createElement('p');
            msgElement.className = 'romantic-message text-xs md:text-sm tracking-tighter text-center max-w-sm';
            msgElement.style.color = color;
            msgElement.innerText = msg;
            container.appendChild(msgElement);
        }

        function toggleBackground() {
            const mainScene = document.getElementById('scene-main');
            const coupleScene = document.getElementById('scene-couple');
            const lyrics = document.getElementById('main-lyrics');
            const status = document.getElementById('status-label');
            const icon = document.getElementById('landscape-btn-icon');
            
            if (!isCoupleScene) {
                gsap.to(mainScene, { opacity: 0, duration: 1.5, ease: "power2.inOut" });
                gsap.to(coupleScene, { opacity: 1, duration: 1.5, ease: "power2.inOut" });
                
                gsap.to(lyrics, { 
                    opacity: 0, 
                    duration: 0.5, 
                    onComplete: () => {
                        lyrics.innerText = "Donde habita el silencio...";
                        gsap.to(lyrics, { opacity: 1, duration: 1 });
                    }
                });

                status.innerText = "Dream Cycles // Deep_Sleep_Mode";
                icon.innerText = "bedtime";
                isCoupleScene = true;
            } else {
                gsap.to(mainScene, { opacity: 1, duration: 1.5, ease: "power2.inOut" });
                gsap.to(coupleScene, { opacity: 0, duration: 1.5, ease: "power2.inOut" });
                
                gsap.to(lyrics, { 
                    opacity: 0, 
                    duration: 0.5, 
                    onComplete: () => {
                        lyrics.innerText = "En el faro de tu amor...";
                        gsap.to(lyrics, { opacity: 1, duration: 1 });
                    }
                });

                status.innerText = "Ether Lullaby // Audio_Stream_Active";
                icon.innerText = "landscape";
                isCoupleScene = false;
            }
        }

        // Initialize sparkles and effects on load
        window.onload = createSparkles;
    </script>
</body></html>
