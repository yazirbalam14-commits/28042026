<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                "primary": "#8A2BE2",
                "on-surface": "#e6e3f5",
                "surface-dim": "#0d0d19",
              },
              "borderRadius": {
                "DEFAULT": "0.5rem",
                "lg": "0.5rem",
                "xl": "0.5rem",
                "full": "9999px"
              },
              "fontFamily": {
                "headline": ["Playfair Display", "serif"],
                "body": ["Manrope", "sans-serif"],
                "serif-fancy": ["Playfair Display", "serif"],
                "pixel": ["'Press Start 2P'", "cursive"]
              }
            },
          },
        }
    </script>
<style>
        body {
            background-color: #0d0d19;
            color: #e6e3f5;
            overflow: hidden;
        }
        .pixel-scanline {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
        .dither-pattern {
            background-image: radial-gradient(#181827 1px, transparent 0);
            background-size: 4px 4px;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        .ethereal-glow {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4), 0 0 30px rgba(138, 43, 226, 0.2);
        }
        .icon-glow {
            filter: drop-shadow(0 0 8px rgba(138, 43, 226, 0.6));
        }
    
        @keyframes messageFade {
            0% { opacity: 0; transform: translateY(10px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }
        .romantic-message {
            font-family: 'Press Start 2P', cursive;
            animation: messageFade 4s ease-in-out forwards;
            text-shadow: 2px 2px #000;
        }

        /* Pixel Art Rendering Mode for Background */
        .pixel-bg {
            image-rendering: pixelated;
            image-rendering: -moz-pixelated;
            image-rendering: crisp-edges;
        }

        /* Animation for Fireflies */
        @keyframes firefly {
            0%, 100% { opacity: 0; transform: translate(0, 0) scale(1); }
            50% { opacity: 0.8; transform: translate(10px, -20px) scale(1.2); }
        }
        .firefly {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #d4ff00;
            box-shadow: 0 0 5px #d4ff00;
            border-radius: 1px;
            pointer-events: none;
        }

        /* Animation for Fish */
        @keyframes fishJump {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            50% { transform: translateY(-40px) rotate(180deg); }
            80% { opacity: 1; }
            100% { transform: translateY(10px) rotate(360deg); opacity: 0; }
        }
        .pixel-fish {
            position: absolute;
            width: 8px;
            height: 4px;
            background: #4a5568;
            clip-path: polygon(0% 50%, 40% 0%, 100% 50%, 40% 100%);
            opacity: 0;
            pointer-events: none;
        }

        /* Animation for Ripples */
        @keyframes rippleEffect {
            0% { transform: scale(0.5); opacity: 0.8; border-width: 2px; }
            100% { transform: scale(3); opacity: 0; border-width: 1px; }
        }
        .ripple {
            position: absolute;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            pointer-events: none;
        }

        /* Transition for scene swap */
        .scene {
            transition: opacity 1s ease-in-out;
        }
    </style>
</head>
<body class="font-body selection:bg-primary/30 selection:text-white">
<!-- Background Layer: Pixel Art Cinematics -->
<div class="fixed inset-0 z-0">
<!-- Night Sky Base -->
<div class="absolute inset-0 bg-[#0d0d19]"></div>
<!-- Scene 1: Nebula (Initial) -->
<div class="scene absolute inset-0 opacity-100" id="scene-nebula">
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-[800px] h-[600px] bg-gradient-to-tr from-primary/20 via-purple-500/10 to-cyan-500/20 blur-[120px] opacity-40"></div>
</div>
<div class="absolute top-20 right-32 w-48 h-48 bg-cyan-400/10 rounded-full border-4 border-cyan-400/20 flex items-center justify-center overflow-hidden">
<div class="absolute inset-0 dither-pattern opacity-50"></div>
<div class="w-full h-full bg-gradient-to-br from-cyan-400 to-transparent opacity-20"></div>
</div>
<img alt="Pixel art style silhouette of a couple" class="pixel-bg w-full h-full object-cover mix-blend-screen opacity-60" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAYvUi64jLIS1E5G1fdeMV10DJsCU4yzyhErV4b9OXL-ISzQoR8zPjfBFrz02AIrc-1fp7_GvAn_-WG7Ik7w2qg3POm5naTEDrsw8aP9N_eEz6GFz6c8KnlahwPdFtWbWsgua2AAv3q-cxTGd-tXce4aj3CEii5sAyRWOjJc4Xn9kpsM7bWieJT2rgYYVj-9rje3N4P-y2hwRw8cyg4J2R3e_5omgtoJn1DI-fbQNoI7JFvFUrmoRK2gCztEK6LHUk1gL9RcKDuYTU"/>
</div>
<!-- Scene 2: Lake (Interactive) -->
<div class="scene absolute inset-0 opacity-0 pointer-events-none" id="scene-lake">
<img alt="16-bit pixel art version of a couple in a boat on a serene lake under a crescent moon and meteor shower" class="pixel-bg w-full h-full object-cover opacity-80" src="https://lh3.googleusercontent.com/aida/ADBb0uiyt0O2I_dQATF3ci-ougT8xOQGwGv4Jl3q_tl7JQPVFEyMYmWRxuTxPqDamOVzz_oEOvZ3zjI-VzBn2hnBjsRJsHi9K-ixiJ-Tq1t3aZXsU-YNHKx_c4LO3w42zjyTj0bIJf4hNsD6p_EjHMMQH_nR5TtoI4LS0Z_DKcpSKojFLFWa-3PsNEDobRbDBPu6hP79Tl4a1xNd45Tp9ujlghK2VAyJdRmcunsoxDakjVAyYApflHywfLsPOKSCNdQq5Teg5YHMVj1qBw"/>
<!-- Animated Elements for Lake -->
<div class="absolute inset-0" id="lake-elements"></div>
</div>
<!-- Persistent Global Animations: Falling Pixel Stars -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-5%] left-[10%] w-[2px] h-24 bg-cyan-400 opacity-60 rotate-[25deg]"></div>
<div class="absolute top-[10%] left-[25%] w-[2px] h-32 bg-fuchsia-500 opacity-50 rotate-[25deg]"></div>
<div class="absolute top-[0%] left-[40%] w-[2px] h-20 bg-primary opacity-60 rotate-[25deg]"></div>
<div class="absolute top-[15%] left-[55%] w-[2px] h-40 bg-cyan-300 opacity-40 rotate-[25deg]"></div>
<div class="absolute top-[-10%] left-[70%] w-[2px] h-28 bg-fuchsia-400 opacity-50 rotate-[25deg]"></div>
<div class="absolute top-[5%] left-[85%] w-[2px] h-36 bg-purple-400 opacity-60 rotate-[25deg]"></div>
<div class="absolute top-[30%] left-[5%] w-[2px] h-16 bg-primary opacity-30 rotate-[25deg]"></div>
<div class="absolute top-[45%] left-[18%] w-[2px] h-24 bg-cyan-400 opacity-40 rotate-[25deg]"></div>
<div class="absolute top-[35%] left-[48%] w-[2px] h-32 bg-fuchsia-600 opacity-30 rotate-[25deg]"></div>
<div class="absolute top-[50%] left-[75%] w-[2px] h-28 bg-cyan-500 opacity-40 rotate-[25deg]"></div>
<div class="absolute top-[65%] left-[12%] w-[2px] h-20 bg-fuchsia-400 opacity-20 rotate-[25deg]"></div>
<div class="absolute top-[70%] left-[40%] w-[2px] h-36 bg-primary opacity-50 rotate-[25deg]"></div>
<div class="absolute top-[55%] left-[90%] w-[2px] h-24 bg-cyan-300 opacity-50 rotate-[25deg]"></div>
<div class="absolute top-[80%] left-[25%] w-[2px] h-18 bg-purple-500 opacity-30 rotate-[25deg]"></div>
<div class="absolute top-[85%] left-[60%] w-[2px] h-30 bg-fuchsia-500 opacity-40 rotate-[25deg]"></div>
</div>
<!-- Scanline Overlay -->
<div class="absolute inset-0 pixel-scanline z-10 opacity-30"></div>
</div>
<!-- UI Layer -->
<div class="relative z-20 min-h-screen flex flex-col">
<!-- Main Content Area: Centered Lyrics -->
<main class="flex-grow flex items-center justify-center">
<section class="text-center px-6 max-w-4xl">
<div id="lyrics-content">
<p class="font-serif-fancy italic text-4xl md:text-6xl text-white ethereal-glow leading-relaxed tracking-wide">
                    En el faro de tu amor...
                </p>
</div>
</section>
<!-- Right-Side Vertical Icon Menu -->
<aside class="absolute right-8 top-1/2 -translate-y-1/2 flex flex-col gap-12 items-center">
<button class="group transition-all duration-300" onclick="showRomanticMessage()">
<span class="material-symbols-outlined text-white/60 group-hover:text-white icon-glow text-3xl">favorite</span>
</button>
<button class="group transition-all duration-300">
<span class="material-symbols-outlined text-white/60 group-hover:text-white icon-glow text-3xl">sports_esports</span>
</button>
<button class="group transition-all duration-300" onclick="toggleLakeScene()">
<span class="material-symbols-outlined text-white/60 group-hover:text-white icon-glow text-3xl">landscape</span>
</button>
<button class="group transition-all duration-300">
<span class="material-symbols-outlined text-white/60 group-hover:text-white icon-glow text-3xl">music_note</span>
</button>
</aside>
</main>
<!-- Footer Area -->
<footer class="h-32 flex flex-col items-center justify-center relative px-8">
<!-- Message Container -->
<div class="absolute top-0 w-full flex justify-center h-12 overflow-visible" id="romantic-message-container"></div>
<!-- Subtle Info -->
<div class="mt-auto pb-8 w-full flex justify-between items-center opacity-40">
<div class="text-[10px] uppercase tracking-[0.4em] text-white font-body">
                Ether Lullaby // Audio_Stream_Active
            </div>
<div class="text-[8px] uppercase tracking-widest text-white font-pixel">
                Sync Status: Stable
            </div>
</div>
</footer>
</div>
<script>
    const messages = [
        'Eres mi universo',
        'Tu amor es mi guía',
        'Siempre juntos',
        'Bajo las mismas estrellas',
        'Mi corazón es tuyo',
        'Contigo el tiempo se detiene',
        'Eternamente en tus ojos'
    ];
    const colors = ['#FFDAB9', '#FFB7C5', '#FFD700']; 
    let colorIndex = 0;

    function showRomanticMessage() {
        const container = document.getElementById('romantic-message-container');
        container.innerHTML = '';
        const msg = messages[Math.floor(Math.random() * messages.length)];
        const color = colors[colorIndex];
        colorIndex = (colorIndex + 1) % colors.length;
        const msgElement = document.createElement('p');
        msgElement.className = 'romantic-message text-xs md:text-sm tracking-tighter text-center max-w-sm';
        msgElement.style.color = color;
        msgElement.innerText = msg;
        container.appendChild(msgElement);
    }

    let isLakeActive = false;
    function toggleLakeScene() {
        const nebula = document.getElementById('scene-nebula');
        const lake = document.getElementById('scene-lake');
        isLakeActive = !isLakeActive;
        
        if(isLakeActive) {
            nebula.classList.remove('opacity-100');
            nebula.classList.add('opacity-0');
            lake.classList.remove('opacity-0', 'pointer-events-none');
            lake.classList.add('opacity-100');
            startLakeAnimations();
        } else {
            lake.classList.remove('opacity-100');
            lake.classList.add('opacity-0', 'pointer-events-none');
            nebula.classList.remove('opacity-0');
            nebula.classList.add('opacity-100');
            stopLakeAnimations();
        }
    }

    let lakeIntervals = [];

    function startLakeAnimations() {
        const container = document.getElementById('lake-elements');
        
        // Spawn Fireflies
        const ffInterval = setInterval(() => {
            const ff = document.createElement('div');
            ff.className = 'firefly';
            ff.style.left = Math.random() * 100 + '%';
            ff.style.top = (40 + Math.random() * 40) + '%';
            ff.style.animation = `firefly ${3 + Math.random() * 4}s infinite ease-in-out`;
            container.appendChild(ff);
            setTimeout(() => ff.remove(), 7000);
        }, 1000);

        // Spawn Fish and Ripples
        const fishInterval = setInterval(() => {
            const x = 10 + Math.random() * 80;
            const y = 65 + Math.random() * 20;

            // Ripple
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = x + '%';
            ripple.style.top = y + '%';
            ripple.style.width = '10px';
            ripple.style.height = '5px';
            ripple.style.animation = 'rippleEffect 2s forwards';
            container.appendChild(ripple);
            setTimeout(() => ripple.remove(), 2000);

            // Fish
            setTimeout(() => {
                const fish = document.createElement('div');
                fish.className = 'pixel-fish';
                fish.style.left = x + '%';
                fish.style.top = y + '%';
                fish.style.animation = 'fishJump 1.5s ease-in-out forwards';
                container.appendChild(fish);
                setTimeout(() => fish.remove(), 1500);
            }, 100);
        }, 5000);

        lakeIntervals.push(ffInterval, fishInterval);
    }

    function stopLakeAnimations() {
        lakeIntervals.forEach(clearInterval);
        lakeIntervals = [];
        document.getElementById('lake-elements').innerHTML = '';
    }
</script>
</body></html>
