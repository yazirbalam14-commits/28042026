<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CELESTIAL | Faltan para comenzar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;700;800&amp;family=Be+Vietnam+Pro:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        /* Pixel Art Font Simulation & Rendering */
        .pixel-text {
            image-rendering: pixelated;
            font-family: 'Manrope', sans-serif;
            letter-spacing: -0.05em;
        }
        /* Glassmorphism utility */
        .glass-panel {
            background: rgba(14, 14, 20, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        /* Star Field - Static Dots for Pixel Feel */
        .star-field {
            background-image: radial-gradient(1px 1px at 10% 10%, #fff, transparent),
                              radial-gradient(1px 1px at 20% 50%, #ca98ff, transparent),
                              radial-gradient(2px 2px at 40% 80%, #00fbfb, transparent),
                              radial-gradient(1px 1px at 60% 20%, #fff, transparent),
                              radial-gradient(2px 2px at 80% 40%, #ff51fa, transparent),
                              radial-gradient(1px 1px at 90% 90%, #fff, transparent);
            background-size: 200px 200px;
        }
        /* Full Screen Pixel BG Fix */
        .pixel-bg {
            background-size: cover;
            background-position: center;
            image-rendering: pixelated;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "tertiary": "#ff51fa",
                      "secondary-fixed-dim": "#00ecec",
                      "tertiary-fixed": "#ff81f5",
                      "on-tertiary-fixed": "#320032",
                      "on-primary-container": "#350062",
                      "on-surface": "#f0ecf6",
                      "on-secondary": "#005c5c",
                      "surface-tint": "#ca98ff",
                      "surface-bright": "#2c2b35",
                      "surface-container-highest": "#25252e",
                      "tertiary-container": "#fe00fe",
                      "surface-container-high": "#1f1f27",
                      "surface": "#0e0e14",
                      "error": "#ff6e84",
                      "on-secondary-container": "#d9fffe",
                      "background": "#0e0e14",
                      "primary": "#ca98ff",
                      "tertiary-fixed-dim": "#ff61f8",
                      "primary-dim": "#9c42f4",
                      "on-tertiary": "#400040",
                      "inverse-on-surface": "#55545c",
                      "on-primary": "#46007d",
                      "secondary-dim": "#00ecec",
                      "error-container": "#a70138",
                      "surface-dim": "#0e0e14",
                      "secondary": "#00fbfb",
                      "on-secondary-fixed-variant": "#006666",
                      "secondary-fixed": "#00fbfb",
                      "tertiary-dim": "#ff51fa",
                      "secondary-container": "#006a6a",
                      "on-tertiary-fixed-variant": "#6a006a",
                      "on-primary-fixed-variant": "#420078",
                      "primary-container": "#c185ff",
                      "error-dim": "#d73357",
                      "inverse-primary": "#8523dd",
                      "on-error-container": "#ffb2b9",
                      "on-background": "#f0ecf6",
                      "primary-fixed": "#c185ff",
                      "on-tertiary-container": "#230023",
                      "on-primary-fixed": "#000000",
                      "on-error": "#490013",
                      "outline-variant": "#48474e",
                      "surface-variant": "#25252e",
                      "inverse-surface": "#fcf8ff",
                      "surface-container-lowest": "#000000",
                      "primary-fixed-dim": "#b772ff",
                      "outline": "#76747c",
                      "on-secondary-fixed": "#004747",
                      "surface-container": "#191920",
                      "surface-container-low": "#131319",
                      "on-surface-variant": "#acaab2"
              },
              "fontFamily": {
                      "headline": ["Manrope"],
                      "display": ["Manrope"],
                      "body": ["Be Vietnam Pro"],
                      "label": ["Be Vietnam Pro"]
              }
            }
          }
        }
    </script>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary min-h-screen flex flex-col">
<!-- MAIN CANVAS -->
<main class="relative flex-grow flex flex-col items-center justify-center overflow-hidden">
<!-- FULL SCREEN PIXEL BACKGROUND LAYER -->
<div class="absolute inset-0 z-0 bg-surface-container-lowest">
<!-- The pixel art background stretched to fill -->
<div class="absolute inset-0 pixel-bg opacity-80" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCSfMJvtXSeMy5p3Dr19Bb1OeLt_t0Nq4tt6RJLSdmaKCztInmE3_z5I9N_yzcaT6mO6UMdaw7PeAf4waYEjT80MHGaXXfgtmNKfO4hfI88d92kwxEqWU_jmRZs7Mj1-rsmIaqKY_eBiCHSFw7BW5SR7iCdYG6h-191oTvncR25P4mGHLlWhaUHjLGDyIF2zxkbNP0zRFtsktcJ5cDYoo6k9Inr8iipNWeVebFIvZfIW706-pFodY-ZrtAL6OHAVtPPR19cUqUPeQI')"></div>
<!-- Animated Star Simulation -->
<div class="absolute inset-0 star-field opacity-40 mix-blend-screen"></div>
<!-- Dark Overlay for Readability -->
<div class="absolute inset-0 bg-black/40"></div>
<!-- Nebula Glows -->
<div class="absolute top-1/4 -left-1/4 w-[80vw] h-[80vw] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-1/4 -right-1/4 w-[60vw] h-[60vw] bg-secondary/5 blur-[100px] rounded-full"></div>
</div>
<!-- COUNTDOWN CONTENT CONTAINER -->
<div class="relative z-20 flex flex-col items-center gap-12 px-6 text-center">
<!-- LABEL: Golden Pixel Font -->
<div class="space-y-2">
<p class="font-headline font-bold text-lg md:text-2xl tracking-[0.2em] text-secondary-fixed brightness-125 pixel-text" style="text-shadow: 0 0 10px rgba(0, 251, 251, 0.4);">
                Faltan para comenzar:
            </p>
<div class="h-[2px] w-12 bg-secondary mx-auto rounded-full shadow-[0_0_8px_rgba(0,251,251,0.8)]"></div>
</div>
<!-- THE TIMER: 16-bit Aesthetic Glass Card -->
<div class="glass-panel p-8 md:p-12 rounded-[2rem] border border-white/10 flex flex-wrap justify-center gap-6 md:gap-12 group transition-all hover:scale-[1.02] shadow-2xl">
<!-- DAYS -->
<div class="flex flex-col items-center">
<span class="font-headline font-black text-6xl md:text-8xl tracking-tighter text-on-surface pixel-text">28</span>
<span class="font-label text-[10px] tracking-[0.3em] uppercase text-on-surface-variant">Días</span>
</div>
<!-- SEPARATOR -->
<div class="hidden md:flex items-center text-primary/30 text-5xl font-thin">:</div>
<!-- HOURS -->
<div class="flex flex-col items-center">
<span class="font-headline font-black text-6xl md:text-8xl tracking-tighter text-on-surface pixel-text">14</span>
<span class="font-label text-[10px] tracking-[0.3em] uppercase text-on-surface-variant">Horas</span>
</div>
<!-- SEPARATOR -->
<div class="hidden md:flex items-center text-primary/30 text-5xl font-thin">:</div>
<!-- MINUTES -->
<div class="flex flex-col items-center">
<span class="font-headline font-black text-6xl md:text-8xl tracking-tighter text-secondary pixel-text">42</span>
<span class="font-label text-[10px] tracking-[0.3em] uppercase text-on-surface-variant">Minutos</span>
</div>
<!-- SEPARATOR -->
<div class="hidden md:flex items-center text-primary/30 text-5xl font-thin">:</div>
<!-- SECONDS -->
<div class="flex flex-col items-center">
<span class="font-headline font-black text-6xl md:text-8xl tracking-tighter text-tertiary pixel-text">09</span>
<span class="font-label text-[10px] tracking-[0.3em] uppercase text-on-surface-variant">Segundos</span>
</div>
</div>
<!-- CTA ACTIONS -->
<div class="flex flex-col items-center gap-6">
<div class="flex flex-col items-center gap-4">
<button class="px-12 py-4 bg-gradient-to-r from-primary to-primary-dim rounded-full text-on-primary-fixed font-bold tracking-tight hover:shadow-[0_0_30px_rgba(202,152,255,0.4)] transition-all transform active:scale-95 text-lg min-w-[240px]">
                    Comenzar
                </button>
<button class="px-12 py-4 glass-panel border border-white/10 rounded-full text-on-surface font-bold tracking-tight hover:bg-white/5 transition-all transform active:scale-95 text-lg min-w-[240px]">
                    Aniversario 2026
                </button>
</div>
<p class="font-label text-[10px] text-on-surface/60 tracking-widest uppercase bg-black/30 px-4 py-1.5 rounded-full backdrop-blur-sm">
                Lanzamiento: 28 de Abril
            </p>
</div>
</div>
</main>
<!-- FOOTER -->
<footer class="w-full flex justify-center items-center px-8 py-12 bg-transparent relative z-30">
<div class="font-manrope text-[10px] tracking-widest uppercase text-purple-400/60">© 2024 THE CELESTIAL ECHO. ALL RIGHTS RESERVED.</div>
</footer>
</body></html>
