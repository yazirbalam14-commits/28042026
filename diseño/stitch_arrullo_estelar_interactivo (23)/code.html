<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                "primary": "#8A2BE2",
                "on-surface": "#e6e3f5",
                "surface-dim": "#0d0d19",
              },
              "borderRadius": {
                "DEFAULT": "0.5rem",
                "lg": "0.5rem",
                "xl": "0.5rem",
                "full": "9999px"
              },
              "fontFamily": {
                "headline": ["Playfair Display", "serif"],
                "body": ["Manrope", "sans-serif"],
                "serif-fancy": ["Playfair Display", "serif"],
                "pixel": ["'Press Start 2P'", "cursive"]
              }
            },
          },
        }
    </script>
<style>
        body {
            background-color: #050510;
            color: #e6e3f5;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        .pixel-scanline {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        .ethereal-glow {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px rgba(138, 43, 226, 0.3);
        }
        .icon-glow {
            filter: drop-shadow(0 0 8px rgba(138, 43, 226, 0.6));
        }
    
        @keyframes messageFade {
            0% { opacity: 0; transform: translateY(10px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }
        .romantic-message {
            font-family: 'Press Start 2P', cursive;
            animation: messageFade 4s ease-in-out forwards;
            text-shadow: 2px 2px #000;
        }

        .pixelated-bg {
            image-rendering: pixelated;
        }

        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
        }

        /* Glint effect */
        @keyframes glint {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 0.6; transform: scale(1); }
        }
        .glint-particle {
            position: absolute;
            background: radial-gradient(circle, #fff 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: glint 4s ease-in-out infinite;
        }
        
        .magic-flash {
            position: fixed;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 18;
        }

        .sparkle {
            position: absolute;
            pointer-events: none;
            background: white;
            border-radius: 50%;
            z-index: 17;
            box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body class="font-body selection:bg-primary/30 selection:text-white m-0 p-0 overflow-hidden w-screen h-screen">
<!-- Background Layer -->
<div class="fixed inset-0 z-0 overflow-hidden" id="bg-container">
<!-- Main Fullscreen Background -->
<div class="scene absolute inset-0 opacity-100" id="scene-main">
<img alt="Pixel art background" class="w-full h-full object-cover block pixelated-bg transition-opacity duration-1000" id="main-bg-image" src="https://lh3.googleusercontent.com/aida/ADBb0uigbriANygx3B3svIzTLvdDHuJZpzZ4QT92rHofxXqo_nt9UPUzg_kQvL05so_7Z0fAtOgZN4YJ5hNKtUGaCwy4soIZRb5gXS-ikmdycw16BmOtpruPalmgy0C5EXYmM-LtGO-WaCn2Enkkzf5BlEFgkHBADysbHc-0Pu-RjqVTDh7aQDam76VY5YCE1o23yG64BcITb-iOO0010KQ1PI-skQ5ASipsXrhAbLNkPzDT-5mnIufmLPzKa-ML_k9UI3etgqjYnbidPg"/>
</div>
<!-- Canvas for Rain of Light, Twinkle & Stardust Effect -->
<canvas id="particle-canvas"></canvas>
<!-- Glint Container -->
<div class="absolute inset-0 pointer-events-none z-[16]" id="glint-container"></div>
<!-- Scanline Overlay -->
<div class="absolute inset-0 pixel-scanline z-10 opacity-10"></div>
</div>
<!-- Magic Flash Element -->
<div class="magic-flash" id="flash-overlay"></div>
<!-- UI Layer -->
<div class="relative z-20 min-h-screen flex flex-col pointer-events-none">
<!-- Main Content Area: Centered Lyrics -->
<main class="flex-grow flex items-center justify-center pointer-events-auto">
<section class="text-center px-6 max-w-4xl">
<div id="lyrics-content">
<p class="font-serif-fancy italic text-4xl md:text-6xl text-white ethereal-glow leading-relaxed tracking-wide" id="main-lyrics">
                        Bajo la luz de tu luna...
                    </p>
</div>
</section>
<!-- Right-Side Vertical Icon Menu -->
<aside class="absolute right-8 top-1/2 -translate-y-1/2 flex flex-col gap-12 items-center">
<button class="group transition-all duration-300 pointer-events-auto" onclick="showRomanticMessage()">
<span class="material-symbols-outlined text-white/60 group-hover:text-white icon-glow text-3xl">favorite</span>
</button>
<button class="group transition-all duration-300 pointer-events-auto" onclick="triggerMagicFlash()">
<span class="material-symbols-outlined text-white/60 group-hover:text-white icon-glow text-3xl">auto_awesome</span>
</button>
<button class="group transition-all duration-300 pointer-events-auto" onclick="toggleAtmosphere()">
<span class="material-symbols-outlined text-white/60 group-hover:text-white icon-glow text-3xl">filter_vintage</span>
</button>
<button class="group transition-all duration-300 pointer-events-auto">
<span class="material-symbols-outlined text-white/60 group-hover:text-white icon-glow text-3xl">music_note</span>
</button>
</aside>
</main>
<!-- Footer Area -->
<footer class="h-32 flex flex-col items-center justify-center relative px-8 pointer-events-none border-none">
<!-- Message Container -->
<div class="absolute top-0 w-full flex justify-center h-12 overflow-visible" id="romantic-message-container"></div>
<!-- Subtle Info -->
<div class="mt-auto pb-8 w-full flex justify-between items-center opacity-70 pointer-events-auto">
<div class="text-[10px] uppercase tracking-[0.4em] text-[#B0C4DE] font-body" id="status-label">
                    Forest Serenade // Moonlit_Dance_Active
                </div>
<div class="text-[8px] uppercase tracking-widest text-[#FFFACD] font-pixel">
                    Sync Status: Stable
                </div>
</div>
</footer>
</div>
<script>
        const messages = [
            'Eres mi universo',
            'Tu amor es mi guía',
            'Siempre juntos',
            'Bajo las mismas estrellas',
            'Mi corazón es tuyo',
            'Contigo el tiempo se detiene',
            'Eternamente en tus ojos'
        ];
        const colors = ['#FFFFFF', '#E0FFFF', '#FFD700', '#F0E68C', '#ADD8E6']; 
        
        // Particle System for Canvas
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor(type) {
                this.type = type; // 'rain', 'twinkle', or 'stardust'
                this.init();
            }

            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                
                if (this.type === 'rain') {
                    this.speedY = Math.random() * 2 + 3; // Rain of light
                    this.speedX = Math.random() * 0.2 - 0.1;
                    this.length = Math.random() * 15 + 5; 
                } else if (this.type === 'stardust') {
                    this.speedY = Math.random() * 0.1 - 0.05;
                    this.speedX = Math.random() * 0.3 + 0.05;
                    this.size = Math.random() * 2 + 0.5;
                } else {
                    this.speedY = 0;
                    this.speedX = 0;
                }
                
                const palette = ['#FFFFFF', '#E0F7FA', '#FFF9C4', '#B3E5FC'];
                this.color = palette[Math.floor(Math.random() * palette.length)];
                this.opacity = Math.random();
                this.fadeSpeed = Math.random() * 0.015 + 0.005;
                this.growing = true;
            }

            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;

                if (this.type === 'rain') {
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x + this.speedX, this.y + this.length);
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = this.size;
                    ctx.stroke();
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    if (this.type === 'twinkle') {
                        ctx.shadowBlur = 8;
                        ctx.shadowColor = this.color;
                    }
                }
            }

            update() {
                if (this.type === 'rain') {
                    this.y += this.speedY;
                    this.x += this.speedX;
                    if (this.y > canvas.height) {
                        this.y = -this.length;
                        this.x = Math.random() * canvas.width;
                    }
                } else if (this.type === 'stardust') {
                    this.y += this.speedY;
                    this.x += this.speedX;
                    this.opacity -= 0.0005;
                    if (this.x > canvas.width || this.opacity <= 0) {
                        this.init();
                        this.x = -10;
                    }
                } else {
                    // Twinkle logic
                    if (this.growing) {
                        this.opacity += this.fadeSpeed;
                        if (this.opacity >= 1) this.growing = false;
                    } else {
                        this.opacity -= this.fadeSpeed;
                        if (this.opacity <= 0) {
                            this.init();
                            this.opacity = 0;
                        }
                    }
                }
            }
        }

        function initParticles() {
            particles = [];
            // Rain of light streaks
            for (let i = 0; i < 40; i++) {
                particles.push(new Particle('rain'));
            }
            // Twinkling sparkles
            for (let i = 0; i < 50; i++) {
                particles.push(new Particle('twinkle'));
            }
            // Drifting stardust
            for (let i = 0; i < 30; i++) {
                particles.push(new Particle('stardust'));
            }
        }

        function createGlints() {
            const container = document.getElementById('glint-container');
            container.innerHTML = '';
            const glintCount = 8;
            for (let i = 0; i < glintCount; i++) {
                const glint = document.createElement('div');
                glint.className = 'glint-particle';
                const size = Math.random() * 30 + 15;
                glint.style.width = `${size}px`;
                glint.style.height = `${size}px`;
                glint.style.left = `${Math.random() * 100}%`;
                glint.style.top = `${Math.random() * 100}%`;
                glint.style.animationDelay = `${Math.random() * 5}s`;
                glint.style.animationDuration = `${Math.random() * 4 + 4}s`;
                container.appendChild(glint);
            }
        }

        function createMagicSparkle() {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            const size = Math.random() * 6 + 2;
            sparkle.style.width = `${size}px`;
            sparkle.style.height = `${size}px`;
            sparkle.style.left = `${Math.random() * 100}vw`;
            sparkle.style.top = `${Math.random() * 100}vh`;
            document.body.appendChild(sparkle);

            gsap.to(sparkle, {
                opacity: 0,
                scale: 2,
                y: "-=50",
                duration: Math.random() * 2 + 1,
                ease: "power1.out",
                onComplete: () => sparkle.remove()
            });
        }

        function triggerMagicFlash() {
            gsap.fromTo("#flash-overlay", 
                { opacity: 0.4 }, 
                { opacity: 0, duration: 0.8, ease: "power2.out" }
            );
            
            for(let i = 0; i < 15; i++) {
                setTimeout(createMagicSparkle, i * 50);
            }
        }

        // Periodic magical sparkles
        setInterval(() => {
            if (Math.random() > 0.7) {
                createMagicSparkle();
            }
        }, 500);

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            resize();
            initParticles();
        });

        function showRomanticMessage() {
            const container = document.getElementById('romantic-message-container');
            container.innerHTML = '';
            const msg = messages[Math.floor(Math.random() * messages.length)];
            const color = colors[Math.floor(Math.random() * colors.length)]; 
            const msgElement = document.createElement('p');
            msgElement.className = 'romantic-message text-xs md:text-sm tracking-tighter text-center max-w-sm';
            msgElement.style.color = color;
            msgElement.innerText = msg;
            container.appendChild(msgElement);
            
            // Extra sparkles on click
            triggerMagicFlash();
        }

        function toggleAtmosphere() {
            gsap.to("#bg-container", { opacity: 0.7, duration: 0.5, yoyo: true, repeat: 1 });
            initParticles();
            showRomanticMessage();
        }

        // Initialize
        window.onload = () => {
            resize();
            initParticles();
            createGlints();
            animate();
            
            // Initial animation for text
            gsap.from("#main-lyrics", {
                opacity: 0,
                y: 20,
                duration: 2,
                ease: "power2.out"
            });
        };
    </script>
</body></html>
