<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                "primary": "#8A2BE2",
                "on-surface": "#e6e3f5",
                "surface-dim": "#0d0d19",
              },
              "borderRadius": {
                "DEFAULT": "0.5rem",
                "lg": "0.5rem",
                "xl": "0.5rem",
                "full": "9999px"
              },
              "fontFamily": {
                "headline": ["Playfair Display", "serif"],
                "body": ["Manrope", "sans-serif"],
                "serif-fancy": ["Playfair Display", "serif"],
                "pixel": ["'Press Start 2P'", "cursive"]
              }
            },
          },
        }
    </script>
<style>
        body {
            background-color: #0d0d19;
            color: #e6e3f5;
            overflow: hidden;
        }
        .pixel-scanline {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
        .dither-pattern {
            background-image: radial-gradient(#181827 1px, transparent 0);
            background-size: 4px 4px;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        .ethereal-glow {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4), 0 0 30px rgba(138, 43, 226, 0.2);
        }
        .icon-glow {
            filter: drop-shadow(0 0 8px rgba(138, 43, 226, 0.6));
        }
    
        @keyframes messageFade {
            0% { opacity: 0; transform: translateY(10px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }
        .romantic-message {
            font-family: 'Press Start 2P', cursive;
            animation: messageFade 4s ease-in-out forwards;
            text-shadow: 2px 2px #000;
        }
    </style>
</head>
<body class="font-body selection:bg-primary/30 selection:text-white">
<!-- Background Layer: Pixel Art Cinematics -->
<div class="fixed inset-0 z-0">
<!-- Night Sky Base -->
<div class="absolute inset-0 bg-[#0d0d19]"></div>
<!-- Nebula Glow -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-[800px] h-[600px] bg-gradient-to-tr from-primary/20 via-purple-500/10 to-cyan-500/20 blur-[120px] opacity-40"></div>
</div>
<!-- Dithered Pixel Moon -->
<div class="absolute top-20 right-32 w-48 h-48 bg-cyan-400/10 rounded-full border-4 border-cyan-400/20 flex items-center justify-center overflow-hidden">
<div class="absolute inset-0 dither-pattern opacity-50"></div>
<div class="w-full h-full bg-gradient-to-br from-cyan-400 to-transparent opacity-20"></div>
</div>
<!-- Main Cinematic Visual -->
<div class="absolute inset-0 flex flex-col items-center justify-center">
<img alt="Pixel art style silhouette of a couple in a warm hug against a deep blue starry night with purple nebula highlights" class="w-full h-full object-cover mix-blend-screen opacity-60" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAYvUi64jLIS1E5G1fdeMV10DJsCU4yzyhErV4b9OXL-ISzQoR8zPjfBFrz02AIrc-1fp7_GvAn_-WG7Ik7w2qg3POm5naTEDrsw8aP9N_eEz6GFz6c8KnlahwPdFtWbWsgua2AAv3q-cxTGd-tXce4aj3CEii5sAyRWOjJc4Xn9kpsM7bWieJT2rgYYVj-9rje3N4P-y2hwRw8cyg4J2R3e_5omgtoJn1DI-fbQNoI7JFvFUrmoRK2gCztEK6LHUk1gL9RcKDuYTU"/>
<!-- Falling Pixel Stars -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-5%] left-[10%] w-[2px] h-24 bg-cyan-400 opacity-60 rotate-[25deg]"></div>
<div class="absolute top-[10%] left-[25%] w-[2px] h-32 bg-fuchsia-500 opacity-50 rotate-[25deg]"></div>
<div class="absolute top-[0%] left-[40%] w-[2px] h-20 bg-primary opacity-60 rotate-[25deg]"></div>
<div class="absolute top-[15%] left-[55%] w-[2px] h-40 bg-cyan-300 opacity-40 rotate-[25deg]"></div>
<div class="absolute top-[-10%] left-[70%] w-[2px] h-28 bg-fuchsia-400 opacity-50 rotate-[25deg]"></div>
<div class="absolute top-[5%] left-[85%] w-[2px] h-36 bg-purple-400 opacity-60 rotate-[25deg]"></div>
<div class="absolute top-[30%] left-[5%] w-[2px] h-16 bg-primary opacity-30 rotate-[25deg]"></div>
<div class="absolute top-[45%] left-[18%] w-[2px] h-24 bg-cyan-400 opacity-40 rotate-[25deg]"></div>
<div class="absolute top-[35%] left-[48%] w-[2px] h-32 bg-fuchsia-600 opacity-30 rotate-[25deg]"></div>
<div class="absolute top-[50%] left-[75%] w-[2px] h-28 bg-cyan-500 opacity-40 rotate-[25deg]"></div>
<div class="absolute top-[65%] left-[12%] w-[2px] h-20 bg-fuchsia-400 opacity-20 rotate-[25deg]"></div>
<div class="absolute top-[70%] left-[40%] w-[2px] h-36 bg-primary opacity-50 rotate-[25deg]"></div>
<div class="absolute top-[55%] left-[90%] w-[2px] h-24 bg-cyan-300 opacity-50 rotate-[25deg]"></div>
<div class="absolute top-[80%] left-[25%] w-[2px] h-18 bg-purple-500 opacity-30 rotate-[25deg]"></div>
<div class="absolute top-[85%] left-[60%] w-[2px] h-30 bg-fuchsia-500 opacity-40 rotate-[25deg]"></div>
</div>
</div>
<!-- Scanline Overlay -->
<div class="absolute inset-0 pixel-scanline z-10 opacity-30"></div>
</div>
<!-- UI Layer -->
<div class="relative z-20 min-h-screen flex flex-col">
<!-- Main Content Area: Centered Lyrics -->
<main class="flex-grow flex items-center justify-center">
<section class="text-center px-6 max-w-4xl">
<div id="lyrics-content">
<p class="font-serif-fancy italic text-4xl md:text-6xl text-white ethereal-glow leading-relaxed tracking-wide">
                    En el faro de tu amor...
                </p>
</div>
</section>
<!-- Right-Side Vertical Icon Menu -->
<aside class="absolute right-8 top-1/2 -translate-y-1/2 flex flex-col gap-12 items-center">
<button class="group transition-all duration-300" onclick="showRomanticMessage()">
<span class="material-symbols-outlined text-white/60 group-hover:text-white icon-glow text-3xl">favorite</span>
</button>
<button class="group transition-all duration-300">
<span class="material-symbols-outlined text-white/60 group-hover:text-white icon-glow text-3xl">sports_esports</span>
</button>
<button class="group transition-all duration-300">
<span class="material-symbols-outlined text-white/60 group-hover:text-white icon-glow text-3xl">landscape</span>
</button>
<button class="group transition-all duration-300">
<span class="material-symbols-outlined text-white/60 group-hover:text-white icon-glow text-3xl">music_note</span>
</button>
</aside>
</main>
<!-- Footer Area: Dynamic Custom Messages & Metadata -->
<footer class="h-32 flex flex-col items-center justify-center relative px-8">
<!-- Message Container (Bottom Aligned) -->
<div class="absolute top-0 w-full flex justify-center h-12 overflow-visible" id="romantic-message-container"></div>
<!-- Subtle Info at Very Bottom -->
<div class="mt-auto pb-8 w-full flex justify-between items-center opacity-40">
<div class="text-[10px] uppercase tracking-[0.4em] text-white font-body">
                Ether Lullaby // Audio_Stream_Active
            </div>
<div class="text-[8px] uppercase tracking-widest text-white font-pixel">
                Sync Status: Stable
            </div>
</div>
</footer>
</div>
<script>
    const messages = [
        'Eres mi universo',
        'Tu amor es mi guía',
        'Siempre juntos',
        'Bajo las mismas estrellas',
        'Mi corazón es tuyo',
        'Contigo el tiempo se detiene',
        'Eternamente en tus ojos'
    ];
    // Warm tones: Peach, Light Rose, Warm Gold
    const colors = ['#FFDAB9', '#FFB7C5', '#FFD700']; 
    let colorIndex = 0;

    function showRomanticMessage() {
        const container = document.getElementById('romantic-message-container');
        
        // Clear previous message if exists
        container.innerHTML = '';
        
        const msg = messages[Math.floor(Math.random() * messages.length)];
        const color = colors[colorIndex];
        colorIndex = (colorIndex + 1) % colors.length;

        const msgElement = document.createElement('p');
        msgElement.className = 'romantic-message text-xs md:text-sm tracking-tighter text-center max-w-sm';
        msgElement.style.color = color;
        msgElement.innerText = msg;

        container.appendChild(msgElement);
    }
</script>
</body></html>
